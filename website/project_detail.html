<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Project</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(980px,100%);margin:0 auto;padding:22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80)}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .card{margin-top:18px;border:1px solid rgba(255,204,0,.18);border-radius:14px;overflow:hidden;background:rgba(9,9,9,.7)}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:14px;border-bottom:1px solid rgba(255,204,0,.12)}
    .headL{display:flex;gap:12px;align-items:flex-start}
    .pfp{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid rgba(255,204,0,.25);background:#0b0b0d}
    .h1{font-weight:800;color:#ffcc00;font-size:20px}
    .meta{margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.55)}
    .banner{width:100%;height:220px;object-fit:cover;background:#0b0b0d;display:none}
    .body{padding:14px;font-size:14px;line-height:1.45;color:rgba(240,232,192,.86);white-space:pre-wrap;border-bottom:1px solid rgba(255,204,0,.10)}
    .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px;border-top:1px solid rgba(255,204,0,.10)}
    .field{border:1px solid rgba(255,204,0,.12);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.18)}
    .field.full{grid-column:1/-1}
    .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.55)}
    .v{margin-top:6px;font-size:13px;color:rgba(240,232,192,.82);overflow-wrap:anywhere}
    .section{margin:0 14px 12px;border:1px solid rgba(255,204,0,.12);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.18)}
    .chips{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid rgba(255,204,0,.12);background:rgba(255,204,0,.08);color:rgba(240,232,192,.88)}
    .badge b{font-weight:800;color:#ffcc00}
    .bar{margin-top:8px;height:10px;border:1px solid rgba(255,204,0,.2);border-radius:999px;overflow:hidden;background:rgba(0,0,0,.22)}
    .bar > i{display:block;height:100%;background:linear-gradient(90deg, rgba(255,240,190,.95), rgba(255,204,0,.75))}
    .err{margin-top:14px;font-family:"JetBrains Mono",monospace;font-size:12px;color:rgba(255,120,120,.9)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/projects"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha · Project</span></a>
      <div style="display:flex;gap:8px;">
        <a class="btn" id="xBtn" href="#" target="_blank" rel="noreferrer" style="display:none;">Open Source</a>
        <a class="btn" id="backBtn" href="/projects">Back</a>
      </div>
    </div>
    <div class="card" id="card" style="display:none;">
      <div class="head">
        <div class="headL">
          <img id="pfp" class="pfp" alt="" style="display:none;" />
          <div>
            <div class="h1" id="title"></div>
            <div class="meta" id="meta"></div>
          </div>
        </div>
      </div>
      <img id="banner" class="banner" alt="" />
      <div class="body" id="summary"></div>
      <div class="section" id="profileSec" style="display:none;"></div>
      <div class="section" id="scoreSec" style="display:none;"></div>
      <div class="section" id="researchSec" style="display:none;"></div>
      <div class="section" id="followersSec" style="display:none;"></div>
    </div>
    <div class="err" id="err" style="display:none;"></div>
  </div>
  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function fmtTime(iso){try{var d=new Date(iso);if(!isNaN(d.getTime())) return d.toLocaleString();}catch(e){} return iso||"—";}
    function fmtFollowers(n){var v=Number(n); if(!isFinite(v)) return "—"; return v.toLocaleString();}
    function getHandle(){
      var m = window.location.pathname.match(/\/project\/([^/?#]+)/);
      return m ? decodeURIComponent(m[1]).replace(/^@/,"") : "";
    }
    function ageFromDate(iso){
      try{
        var d = new Date(iso);
        if(isNaN(d.getTime())) return "—";
        var sec = Math.max(0, (Date.now()-d.getTime())/1000);
        var days = Math.floor(sec/86400);
        return days + " days ago";
      }catch(e){ return "—"; }
    }
    function scoreStatus(s){
      var n = Number(s||0);
      if(n >= 70) return "Strong";
      if(n >= 40) return "Could be Something";
      return "Early";
    }
    async function main(){
      var h=getHandle();
      if(!h){ document.getElementById("err").style.display="block"; document.getElementById("err").textContent="Missing project handle."; return; }
      var r = await fetch("/api/project/"+encodeURIComponent(h), {credentials:"include"});
      if(!r.ok){ document.getElementById("err").style.display="block"; document.getElementById("err").textContent="Could not load project ("+r.status+")."; return; }
      var p = await r.json();
      document.getElementById("card").style.display="block";
      document.getElementById("title").innerHTML = "@"+esc(p.handle||h);
      document.getElementById("meta").textContent = "Category: " + (p.category||"—") + " · Alerted: " + fmtTime(p.alerted_at||"");
      document.getElementById("summary").innerHTML = esc((p.summary||p.description||"No summary."));
      if (p.pfp_url){
        var pfp = document.getElementById("pfp");
        pfp.src = p.pfp_url;
        pfp.style.display = "block";
        pfp.onerror = function(){ try{ pfp.style.display="none"; }catch(e){} };
      }
      if (p.banner_url){
        var ban = document.getElementById("banner");
        ban.src = p.banner_url;
        ban.style.display = "block";
        ban.onerror = function(){ try{ ban.style.display="none"; }catch(e){} };
      }

      var profile = document.getElementById("profileSec");
      profile.style.display = "block";
      profile.innerHTML =
        '<div class="k">Profile</div>'
        + '<div class="v">Name: <b style="color:#ffcc00;">'+esc(p.name||"—")+'</b> | Category: <b>'+esc(p.category||"—")+'</b></div>'
        + '<div class="chips">'
        + '<span class="badge"><b>Age</b> '+esc(ageFromDate(p.created_at||""))+'</span>'
        + '<span class="badge"><b>Followers</b> '+esc(fmtFollowers(p.followers))+'</span>'
        + '</div>';

      var score = Math.max(0, Math.min(100, Number(p.score||0)));
      var scoreSec = document.getElementById("scoreSec");
      scoreSec.style.display = "block";
      scoreSec.innerHTML =
        '<div class="k">Social Score</div>'
        + '<div class="chips"><span class="badge"><b>Score</b> '+esc(String(score))+'%</span></div>'
        + '<div class="bar"><i style="width:'+esc(String(score))+'%;"></i></div>'
        + '<div class="v">Status: <b>'+scoreStatus(score)+'</b> | Verified: ✅</div>';

      var researchSec = document.getElementById("researchSec");
      researchSec.style.display = "block";
      researchSec.innerHTML =
        '<div class="k">Nerds Alpha Research</div>'
        + '<div class="v">'+esc((p.summary||p.description||"No research text."))+'</div>';

      if(Array.isArray(p.smart_followers) && p.smart_followers.length){
        var names = p.smart_followers.map(function(x){
          var h = String(x||"").replace(/^@/,"");
          return '<a href="https://x.com/'+esc(h)+'" target="_blank" rel="noreferrer" style="color:#ffcc00">@'+esc(h)+'</a>';
        }).join(" · ");
        var folSec = document.getElementById("followersSec");
        folSec.style.display = "block";
        folSec.innerHTML =
          '<div class="k">Smart Followers</div>'
          + '<div class="v">'+names+'</div>'
          + '<div class="chips"><span class="badge"><b>Velcor3 engaged</b> '+esc(String(p.smart_followers_count||p.smart_followers.length||0))+' smart followers</span></div>';
      }
      if(p.x_url){
        var x=document.getElementById("xBtn");
        x.href=p.x_url; x.style.display="inline-block";
      }
    }
    main();
  </script>
</body>
</html>
