<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Token Alerts</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:100%;max-width:1600px;margin:0 auto;padding:18px 22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80)}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .grid{margin-top:14px;display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{border:1px solid rgba(255,204,0,.18);border-radius:14px;background:rgba(9,9,9,.7);overflow:hidden;position:relative}
    .card.accent::before{
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      background: radial-gradient(900px 240px at 20% 0%, rgba(var(--acc,255,204,0), .14), transparent 55%);
      opacity:.9;
    }
    .card.accent{border-color:rgba(var(--acc,255,204,0), .28); box-shadow:0 0 0 1px rgba(var(--acc,255,204,0), .06) inset}
    .card.span12{grid-column:span 12}
    .card.span6{grid-column:span 6}
    .card.span4{grid-column:span 4}
    @media (max-width: 980px){ .card.span4{grid-column:span 12} .card.span6{grid-column:span 12} }
    .ph{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.12);display:flex;justify-content:space-between;align-items:center}
    .pt{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.70)}
    .ps{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .agoTag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;background:rgba(255,204,0,.10);border:1px solid rgba(255,204,0,.22);font-family:"JetBrains Mono",monospace;font-size:9.5px;color:#ffcc00;white-space:nowrap;font-weight:700}
    .timeExact{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.55);white-space:nowrap}
    /* Panel body scroll: vertical only; tables can scroll horizontally inside */
    .pb{padding:10px 14px;max-height:74vh;overflow-y:auto;overflow-x:hidden}
    /* Tighter max-height so leaderboards / buckets scroll with more rows from API */
    .pb.pb-tight{max-height:min(52vh,520px);min-height:120px}
    /* In-panel vertical scrollbar (match site style) */
    .pb{
      scrollbar-width: thin;
      scrollbar-color: rgba(255,204,0,.40) rgba(0,0,0,.18);
    }
    .pb::-webkit-scrollbar{width:10px;height:10px}
    .pb::-webkit-scrollbar-track{
      background:rgba(0,0,0,.18);
      border-radius:999px;
    }
    .pb::-webkit-scrollbar-thumb{
      background:rgba(255,204,0,.22);
      border:1px solid rgba(255,204,0,.20);
      border-radius:999px;
    }
    .pb::-webkit-scrollbar-thumb:hover{
      background:rgba(255,204,0,.34);
      border-color:rgba(255,204,0,.28);
    }
    .pb::-webkit-scrollbar-corner{background:transparent}

    /* Horizontal scroller (inside the box) for the table */
    .tableScroll{
      overflow-x:auto;
      overflow-y:hidden;
      padding-bottom:6px; /* room for scrollbar */
      margin:0 -2px;      /* keep edges flush */
    }
    .tableScroll::-webkit-scrollbar{width:10px;height:10px}
    .tableScroll::-webkit-scrollbar-track{
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,204,0,.10);
      border-radius:999px;
    }
    .tableScroll::-webkit-scrollbar-thumb{
      background:rgba(255,204,0,.22);
      border:1px solid rgba(255,204,0,.20);
      border-radius:999px;
    }
    .tableScroll::-webkit-scrollbar-thumb:hover{
      background:rgba(255,204,0,.34);
      border-color:rgba(255,204,0,.28);
    }
    /* Firefox */
    .tableScroll{scrollbar-color: rgba(255,204,0,.40) rgba(0,0,0,.18); scrollbar-width: thin;}
    .item{padding:10px 0;border-bottom:1px solid rgba(255,204,0,.10)}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .ttl{font-weight:900;color:#ffcc00}
    .tmeta{white-space:nowrap;color:rgba(240,232,192,.45);font-family:"JetBrains Mono",monospace;font-size:10px}
    .body{margin-top:6px;color:rgba(240,232,192,.78);font-size:13px;line-height:1.35;white-space:pre-wrap}
    /* Table-like layout (responsive; may scroll horizontally inside .tableScroll) */
    .topHeader{display:grid;
      grid-template-columns:
        46px
        minmax(220px, 1.6fr)
        minmax(120px, 1fr)
        minmax(110px, 1fr)
        minmax(110px, 1fr)
        minmax(80px, .9fr)
        minmax(140px, 1.1fr)
        minmax(90px, .9fr);
      gap:10px;align-items:center;
      padding:10px 0;border-bottom:1px solid rgba(255,204,0,.16)}
    .tokRow{display:grid;
      grid-template-columns:
        46px
        minmax(220px, 1.6fr)
        minmax(120px, 1fr)
        minmax(110px, 1fr)
        minmax(110px, 1fr)
        minmax(80px, .9fr)
        minmax(140px, 1.1fr)
        minmax(90px, .9fr);
      gap:10px;align-items:center;
      padding:10px 0;border-bottom:1px solid rgba(255,204,0,.10)}
    .colH{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.45)}
    @media (max-width: 1020px){
      .topHeader,.tokRow{grid-template-columns:46px 1fr}
      .topHeader .colH{display:none}
      .tokRow .colTime,.tokRow .colCall,.tokRow .colAth,.tokRow .colAthx,.tokRow .colCaller,.tokRow .colLinks{display:none}
    }
    /* Mid-size screens: keep all columns but tighten them */
    @media (max-width: 1320px){
      .topHeader,.tokRow{
        grid-template-columns:
          46px
          minmax(190px, 1.5fr)
          minmax(110px, 1fr)
          minmax(100px, 1fr)
          minmax(100px, 1fr)
          minmax(76px, .9fr)
          minmax(120px, 1.1fr)
          minmax(86px, .9fr);
        gap:8px;
      }
    }
    /* Prevent any child from forcing horizontal overflow */
    .tokRow > *{min-width:0}
    .colCaller,.colLinks{min-width:0}
    .colCaller a,.colLinks a{display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis}
    .av{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,204,0,.22);background:rgba(255,204,0,.06);overflow:hidden}
    .av img{width:100%;height:100%;object-fit:cover;display:block}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;
      font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid rgba(255,204,0,.12);background:rgba(255,204,0,.08);color:rgba(240,232,192,.88)}
    .badge.k{background:rgba(120,180,255,.10);border-color:rgba(120,180,255,.22)}
    .badge.g{background:rgba(120,255,180,.10);border-color:rgba(120,255,180,.22)}
    .badge.r{background:rgba(255,150,150,.10);border-color:rgba(255,150,150,.22)}
    .badge.p{background:rgba(200,160,255,.10);border-color:rgba(200,160,255,.22)}
    .badge b{font-weight:800;color:#ffcc00}
    .sub{margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}

    /* Loading / error + LIVE pill */
    .loadWrap{display:flex;align-items:center;gap:10px}
    .err{padding:12px 14px;color:rgba(255,150,150,.88);font-family:"JetBrains Mono",monospace;font-size:11px}
    .livePill{
      display:inline-flex;align-items:center;gap:8px;
      font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
      padding:6px 10px;border-radius:999px;
      background:rgba(90,255,160,.12);border:1px solid rgba(90,255,160,.28);
      color:rgba(200,255,220,.95);
      box-shadow:0 0 0 1px rgba(90,255,160,.10) inset;
    }
    .livePill i{width:7px;height:7px;border-radius:50%;background:#5aff9f;box-shadow:0 0 16px rgba(90,255,160,.55);display:inline-block;animation:pulse 1.1s ease-in-out infinite}
    @keyframes pulse{0%{opacity:.35;transform:scale(.9)}50%{opacity:1;transform:scale(1)}100%{opacity:.35;transform:scale(.9)}}
    .wait{padding:14px 14px;color:rgba(240,232,192,.55);font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.6}
    .headRight{display:flex;align-items:center;gap:10px}
    .liveMini{transform:translateY(-1px); padding:5px 9px}
    .liveMini i{width:6px;height:6px}

    /* Column-specific accents */
    .accLow{--acc:120,180,255}
    .acc100k{--acc:255,220,120}
    .acc1m{--acc:120,255,180}

    /* Slightly tint the pills inside each column */
    .accLow .badge.k{background:rgba(120,180,255,.14);border-color:rgba(120,180,255,.30)}
    .acc100k .badge.k{background:rgba(255,220,120,.14);border-color:rgba(255,220,120,.30)}
    .acc1m .badge.k{background:rgba(120,255,180,.14);border-color:rgba(120,255,180,.30)}

    /* Full-page loader (shown on first load only) */
    .pageLoader{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(9,9,9,.88);
      backdrop-filter: blur(6px);
      z-index:9999;
    }
    .pageLoader.hidden{display:none}
    .loaderCard{
      width:min(520px, calc(100% - 44px));
      border:1px solid rgba(255,204,0,.18);
      border-radius:14px;
      background:rgba(0,0,0,.28);
      padding:16px 16px 14px 16px;
      box-shadow:0 0 0 1px rgba(255,204,0,.06) inset;
    }
    .loaderTitle{
      font-family:"JetBrains Mono",monospace;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(240,232,192,.70);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .loaderBar{
      margin-top:12px;
      height:10px;
      border-radius:999px;
      border:1px solid rgba(255,204,0,.16);
      background:rgba(0,0,0,.25);
      overflow:hidden;
    }
    .loaderBar > i{
      display:block;
      height:100%;
      width:38%;
      background:linear-gradient(90deg, rgba(90,255,160,.0), rgba(255,204,0,.24), rgba(90,255,160,.18), rgba(255,204,0,.10), rgba(90,255,160,.0));
      transform:translateX(-120%);
      animation:loaderMove 1.05s ease-in-out infinite;
    }
    @keyframes loaderMove{
      0%{transform:translateX(-120%)}
      55%{transform:translateX(120%)}
      100%{transform:translateX(120%)}
    }
  </style>
</head>
<body>
  <div class="pageLoader" id="pageLoader" aria-live="polite" aria-busy="true">
    <div class="loaderCard">
      <div class="loaderTitle">
        <span>Loading token alerts</span>
        <span class="livePill" style="padding:5px 9px;"><i></i>LIVE</span>
      </div>
      <div class="loaderBar" role="progressbar" aria-label="Loading">
        <i></i>
      </div>
    </div>
  </div>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha · Token Alerts</span></a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="/projects">Projects</a>
        <a class="btn" href="/daily-finds">Daily Finds</a>
        <a class="btn" href="/account">Account</a>
      </div>
    </div>

    <div class="grid">
      <div class="card span12">
        <div class="ph">
          <div class="pt">Top performing alerts (7 days) · ranked by ATHx</div>
          <div class="loadWrap">
            <span class="livePill" title="Live feed"><i></i>LIVE</span>
            <div class="ps" id="stat">—</div>
          </div>
        </div>
        <div class="pb pb-tight" id="top"></div>
      </div>

      <div class="card accent accLow span4">
        <div class="ph">
          <div class="pt">Low cap alerts</div>
          <div class="headRight"><span class="livePill liveMini"><i></i>LIVE</span><div class="ps">MC@call &lt;50k</div></div>
        </div>
        <div class="pb pb-tight" id="b_low"></div>
      </div>
      <div class="card accent acc100k span4">
        <div class="ph">
          <div class="pt">Mid cap alerts</div>
          <div class="headRight"><span class="livePill liveMini"><i></i>LIVE</span><div class="ps">50k–1M @call</div></div>
        </div>
        <div class="pb pb-tight" id="b_100k"></div>
      </div>
      <div class="card accent acc1m span4">
        <div class="ph">
          <div class="pt">1M+ cap alerts</div>
          <div class="headRight"><span class="livePill liveMini"><i></i>LIVE</span><div class="ps">1M+ MCap @call</div></div>
        </div>
        <div class="pb pb-tight" id="b_1m"></div>
      </div>
    </div>
  </div>

  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function _pad2(n){ n = Number(n||0); return (n<10?("0"+n):(""+ n)); }
    function _fmtUTC(d){
      return _pad2(d.getUTCDate())+"/"+_pad2(d.getUTCMonth()+1)+"/"+d.getUTCFullYear()
        +" "+_pad2(d.getUTCHours())+":"+_pad2(d.getUTCMinutes())+":"+_pad2(d.getUTCSeconds());
    }
    function _parseDate(v){
      try{
        if(!v && v!==0) return null;
        var s=String(v).trim();
        if(!s) return null;
        if(/^\d{10,13}$/.test(s)){var n=parseInt(s,10);if(s.length===10)n*=1000;var d0=new Date(n);if(!isNaN(d0.getTime()))return d0;}
        var d=new Date(s); if(!isNaN(d.getTime()))return d;
        var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
        if(m){var d2=new Date(Date.UTC(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]||0),parseInt(m[5]||0),parseInt(m[6]||0)));if(!isNaN(d2.getTime()))return d2;}
        return null;
      }catch(e){return null;}
    }
    function fmtTime(v){
      var d=_parseDate(v); if(!d) return String(v||"");
      return _fmtUTC(d);
    }
    function hoursAgo(v){
      var d=_parseDate(v); if(!d) return null;
      var diff=(Date.now()-d.getTime())/1000;
      if(diff<0) return null;
      if(diff<60) return Math.round(diff)+"s ago";
      if(diff<3600) return Math.round(diff/60)+"m ago";
      var h=diff/3600;
      if(h<24) return h.toFixed(1)+"h ago";
      return Math.floor(h/24)+"d "+Math.round(h%24)+"h ago";
    }
    function fmtHour(v){
      var d=_parseDate(v); if(!d) return "";
      return _pad2(d.getUTCHours())+":"+_pad2(d.getUTCMinutes())+" UTC";
    }
    function fmtMc(n){
      if (n === null || n === undefined) return "—";
      var v = Number(n);
      if (!isFinite(v) || v<=0) return "—";
      if (v >= 1e9) return "$" + (v/1e9).toFixed(2) + "B";
      if (v >= 1e6) return "$" + (v/1e6).toFixed(2) + "M";
      if (v >= 1e3) return "$" + (v/1e3).toFixed(1) + "K";
      return "$" + Math.round(v);
    }
    function fmtX(x){
      if (x === null || x === undefined) return "—";
      var v = Number(x);
      if (!isFinite(v) || v<=0) return "—";
      return v.toFixed(2) + "x";
    }
    function badge(label, value, cls){
      var v = (value===null||value===undefined||value==="") ? "—" : String(value);
      return '<span class="badge '+esc(cls||"")+'"><b>'+esc(label)+'</b> '+esc(v)+'</span>';
    }
    async function fetchJsonWithTimeout(url, timeoutMs){
      var ms = Number(timeoutMs||12000);
      var ctrl = null;
      var timer = null;
      try{
        if (typeof AbortController !== "undefined"){
          ctrl = new AbortController();
          timer = setTimeout(function(){ try{ ctrl.abort(); }catch(e){} }, ms);
        }
        var res = await fetch(url, {credentials:"include", signal: ctrl ? ctrl.signal : undefined});
        if (timer) clearTimeout(timer);
        if(!res.ok){
          var txt = "";
          try{ txt = (await res.text()) || ""; }catch(e){}
          throw new Error("HTTP " + res.status + (txt ? (": " + txt.slice(0,180)) : ""));
        }
        return await res.json();
      }catch(e){
        if (timer) clearTimeout(timer);
        throw e;
      }
    }
    function _isAbortError(e){
      var s = String((e && (e.name || e.message || e)) || "");
      return /AbortError|aborted/i.test(s);
    }
    function renderTop(elId, items){
      var el=document.getElementById(elId);
      if(!items||!items.length){el.innerHTML='<div class="ps">No alerts yet.</div>';return;}
      var html="";
      html+='<div class="tableScroll">';
      html+='<div class="topHeader">'
        +'<div></div>'
        +'<div class="colH">Token alerts</div>'
        +'<div class="colH">First call (Kolfi)</div>'
        +'<div class="colH">MC@call</div>'
        +'<div class="colH">Current MC</div>'
        +'<div class="colH">ATH</div>'
        +'<div class="colH">ATHx</div>'
        +'<div class="colH">Since call</div>'
        +'<div class="colH">Caller</div>'
        +'<div class="colH">Links</div>'
        +'</div>';
      items.forEach(function(r, idx){
        var av = (r.thumb_url||"").trim();
        var chart = r.chart_url || "";
        var dex = r.dex_url || "";
        var callerLink = r.caller_x ? ("https://x.com/" + String(r.caller_x).replace(/^@/,"")) : "";
        html+='<div class="tokRow">';
        html+='<div class="av">'+(av?('<img src="'+esc(av)+'" loading="lazy" />'):'')+'</div>';
        html+='<div>';
        html+='<div class="row"><div class="ttl">'+esc(String(idx+1)+". ")+ '<a href="'+esc(chart)+'" target="_blank" rel="noreferrer" style="color:#ffcc00">'+esc(r.ticker||"—")+'</a></div></div>';
        html+='<div class="body" style="margin-top:4px;color:rgba(240,232,192,.60);font-size:12px;">'
          +esc(r.mint||"").slice(0,6)+'…'+esc(r.mint||"").slice(-6)
          +'</div>';
        html+='</div>';
        var _ago=hoursAgo(r.call_ts||""); var _hr=fmtHour(r.call_ts||"");
        html+='<div class="colTime"><span class="timeExact">'+esc(_hr)+'</span>'+(_ago?'<br><span class="agoTag">'+esc(_ago)+'</span>':'')+'</div>';
        html+='<div class="colCall">'+badge("MC", fmtMc(r.call_mc), "k")+'</div>';
        html+='<div class="colAth">'+badge("Now", fmtMc(r.cur_mc), "g")+'</div>';
        html+='<div class="colAth">'+badge("ATH", fmtMc(r.ath_mc), "g")+'</div>';
        html+='<div class="colAthx">'+badge("ATHx", fmtX(r.ath_x), "g")+'</div>';
        html+='<div class="colAthx">'+badge("Since", fmtX(r.since_x), "g")+'</div>';
        html+='<div class="colCaller">'+(callerLink?('<a class="badge r" target="_blank" rel="noreferrer" href="'+esc(callerLink)+'"><b>'+esc(r.caller||"Caller")+'</b></a>'):badge("Caller", r.caller||"—", "r"))+'</div>';
        html+='<div class="colLinks">'
          +(chart?('<a class="badge" target="_blank" rel="noreferrer" href="'+esc(chart)+'"><b>Chart</b></a>'):'')
          +(dex?('<a class="badge p" target="_blank" rel="noreferrer" href="'+esc(dex)+'"><b>Dex</b></a>'):'')
          +(r.token_x_url?('<a class="badge r" target="_blank" rel="noreferrer" href="'+esc(r.token_x_url)+'"><b>X</b></a>'):'')
          +(r.token_site_url?('<a class="badge" target="_blank" rel="noreferrer" href="'+esc(r.token_site_url)+'"><b>Site</b></a>'):'')
          +'</div>';
        html+='</div>';
      });
      html+='</div>';
      el.innerHTML=html;
    }
    function renderBucket(elId, items){
      var el=document.getElementById(elId);
      if(!items||!items.length){
        el.innerHTML='<div class="wait"><span class="livePill" style="padding:5px 9px;"><i></i>LIVE</span> <span class="ps" style="margin-left:8px;">Waiting for signal…</span></div>';
        return;
      }
      var html="";
      items.forEach(function(r){
        var detail = r.event_id ? ("/alert/"+encodeURIComponent(r.event_id)) : "";
        var chart = r.chart_url || "";
        var callerLink = r.caller_x ? ("https://x.com/" + String(r.caller_x).replace(/^@/,"")) : "";
        var av = (r.thumb_url||"").trim();
        var _ts=r.call_ts||r.ts||""; var _ago2=hoursAgo(_ts); var _hr2=fmtHour(_ts);
        html+='<div class="item">';
        html+='<div class="row"><div class="ttl" style="display:flex;align-items:center;gap:10px;min-width:0;">'
          +'<span class="av" style="width:32px;height:32px;border-radius:10px;flex:0 0 auto;">'+(av?('<img src="'+esc(av)+'" loading="lazy" />'):'')+'</span>'
          +'<span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'
          +(detail?('<a href="'+esc(detail)+'">'+esc(r.ticker||r.title||"Token")+'</a>'):esc(r.ticker||r.title||"Token"))
          +'</span></div>'
          +'<div style="text-align:right"><span class="timeExact">'+esc(_hr2)+'</span>'+(_ago2?'<br><span class="agoTag">'+esc(_ago2)+'</span>':'')+'</div></div>';
        html+='<div class="sub">'
          +badge("MC@call", fmtMc(r.call_mc), "k")
          +badge("Now", fmtMc(r.cur_mc), "g")
          +badge("ATH", fmtMc(r.ath_mc), "g")
          +badge("Since", fmtX(r.since_x), "g")
          +badge("ATHx", fmtX(r.ath_x), "g")
          +'</div>';
        var callers = Array.isArray(r.callers) ? r.callers : [];
        var callersHtml = "";
        if(callers.length){
          callersHtml = callers.slice(0,3).map(function(c){
            var cLink = c.x ? ("https://x.com/" + String(c.x).replace(/^@/,"")) : "";
            var label = (c.name || c.x || "caller");
            return cLink
              ? '<a class="badge r" target="_blank" rel="noreferrer" href="'+esc(cLink)+'"><b>Caller</b> '+esc(label)+'</a>'
              : badge("Caller", label, "r");
          }).join("");
        } else {
          callersHtml = (callerLink?('<a class="badge r" target="_blank" rel="noreferrer" href="'+esc(callerLink)+'"><b>Caller</b> '+esc(r.caller||"")+'</a>'):(r.caller?badge("Caller", r.caller, "r"):""));
        }
        html+='<div class="sub">'
          +callersHtml
          +(chart?('<a class="badge" target="_blank" rel="noreferrer" href="'+esc(chart)+'"><b>Chart</b> gmgn</a>'):'')
          +(r.dex_url?('<a class="badge" target="_blank" rel="noreferrer" href="'+esc(r.dex_url)+'"><b>Dex</b> link</a>'):'')
          +(r.token_x_url?('<a class="badge r" target="_blank" rel="noreferrer" href="'+esc(r.token_x_url)+'"><b>Token X</b></a>'):'')
          +(r.token_site_url?('<a class="badge" target="_blank" rel="noreferrer" href="'+esc(r.token_site_url)+'"><b>Site</b></a>'):'')
          +'</div>';
        html+='</div>';
      });
      el.innerHTML=html;
    }
    var _refreshBusy = false;
    var _firstLoad = true;
    async function refresh(){
      if (_refreshBusy) return;
      _refreshBusy = true;
      var stat = document.getElementById("stat");
      if (stat) stat.textContent = "Updating…";
      try{
        var d;
        try{
          d = await fetchJsonWithTimeout("/api/kol/dashboard?hours=24&top=10&per_bucket=50", 20000);
        }catch(e1){
          // Retry once with a lighter payload before surfacing an error.
          d = await fetchJsonWithTimeout("/api/kol/dashboard?hours=24&top=10&per_bucket=30", 12000);
        }
        renderTop("top", (d&&d.top)||[]);
        var b = (d&&d.buckets)||{};
        renderBucket("b_low", b.low||[]);
        renderBucket("b_100k", b["100k"]||[]);
        renderBucket("b_1m", b["1m"]||[]);
        if (stat) stat.textContent="Updated " + new Date().toLocaleTimeString();
      } catch(e){
        var msg = _isAbortError(e)
          ? "Timeout while loading Kolfi data. Auto-refresh will retry."
          : ("Failed to load: " + String(e||""));
        document.getElementById("top").innerHTML = '<div class="err">'+esc(msg)+'</div>';
        document.getElementById("b_low").innerHTML = '<div class="ps">—</div>';
        document.getElementById("b_100k").innerHTML = '<div class="ps">—</div>';
        document.getElementById("b_1m").innerHTML = '<div class="ps">—</div>';
        if (stat) stat.textContent = "Error";
      } finally {
        _refreshBusy = false;
        if (_firstLoad){
          _firstLoad = false;
          var pl = document.getElementById("pageLoader");
          if (pl) { pl.classList.add("hidden"); pl.setAttribute("aria-busy","false"); }
        }
      }
    }
    // Less aggressive refresh to avoid hammering APIs (each refresh can be expensive).
    refresh(); setInterval(refresh,20000);
  </script>
  <script src="/static/community_pulse.js" defer></script>
</body>
