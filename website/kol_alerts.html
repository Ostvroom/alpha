<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Token Alerts</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #090909; color: #f0e8c0; font-family: Inter, system-ui, sans-serif; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* ── Layout: full-viewport flex column ── */
    .wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 1680px; margin: 0 auto; padding: 14px 20px 0; }

    /* ── Top nav ── */
    .nav { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 28px; height: 28px; border: 1px solid rgba(255,204,0,.30); border-radius: 6px; }
    .brand-name { font-family: "JetBrains Mono", monospace; letter-spacing: .14em; text-transform: uppercase; color: #ffcc00; font-weight: 700; font-size: 11px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .nav-btn { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: .10em; text-transform: uppercase; padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,204,0,.20); color: rgba(240,232,192,.75); transition: border-color .15s, color .15s; }
    .nav-btn:hover { border-color: rgba(255,204,0,.50); color: #ffcc00; }
    .update-ts { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(240,232,192,.35); white-space: nowrap; }

    /* ── 3-column grid: fills remaining height ── */
    .cols { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch; padding-bottom: 14px; }
    @media (max-width: 1100px) { .cols { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px)  { .cols { grid-template-columns: 1fr; } }

    /* ── Column card: fills full grid cell height ── */
    .col-card {
      border-radius: 16px;
      border: 1px solid rgba(255,204,0,.14);
      background: rgba(12,12,14,.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .col-card.low  { border-color: rgba(120,180,255,.22); --acc-r:120; --acc-g:180; --acc-b:255; }
    .col-card.mid  { border-color: rgba(255,215,80,.22);  --acc-r:255; --acc-g:215; --acc-b:80;  }
    .col-card.big  { border-color: rgba(90,255,160,.22);  --acc-r:90;  --acc-g:255; --acc-b:160; }

    /* Subtle top glow matching column colour */
    .col-card::before {
      content: "";
      display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(var(--acc-r,255),var(--acc-g,204),var(--acc-b,0),.55) 50%, transparent 100%);
    }

    /* ── Column header ── */
    .col-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .col-title { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 700; color: rgba(240,232,192,.80); }
    .col-meta  { display: flex; align-items: center; gap: 8px; }
    .col-count { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(var(--acc-r,255),var(--acc-g,204),var(--acc-b,0),.80); background: rgba(var(--acc-r,255),var(--acc-g,204),var(--acc-b,0),.10); border: 1px solid rgba(var(--acc-r,255),var(--acc-g,204),var(--acc-b,0),.22); padding: 2px 8px; border-radius: 999px; }
    .col-range { font-family: "JetBrains Mono", monospace; font-size: 9px; color: rgba(240,232,192,.35); }

    /* ── LIVE pill ── */
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px;
      background: rgba(90,255,160,.10); border: 1px solid rgba(90,255,160,.28); color: rgba(180,255,210,.90);
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #5aff9f; box-shadow: 0 0 10px rgba(90,255,160,.60); display: inline-block; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.30;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }

    /* ── Scroll body: flex-grows to fill remaining column height ── */
    .col-body {
      flex: 1;
      min-height: 0;
      padding: 0 12px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,204,0,.30) transparent;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: rgba(255,204,0,.25); border-radius: 999px; }

    /* ── Token item ── */
    .tok {
      padding: 14px 0 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
    }
    .tok:last-child { border-bottom: none; }
    .tok.is-new { animation: flashIn .6s ease-out; }
    @keyframes flashIn {
      0%   { background: rgba(255,204,0,.08); }
      100% { background: transparent; }
    }

    /* ── Token header row ── */
    .tok-head { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
    .tok-id   { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .tok-av   {
      width: 40px; height: 40px; flex: 0 0 40px;
      border-radius: 11px; border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .tok-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* ── Token avatar placeholder ── */
    .tok-av-placeholder { font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 700; color: rgba(255,204,0,.55); }
    .tok-names { min-width: 0; }
    .tok-ticker {
      font-weight: 900; font-size: 15px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: .01em;
    }
    .tok-ticker a { color: #fff; }
    .tok-ticker a:hover { color: #ffcc00; }
    .tok-mint { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(240,232,192,.28); margin-top: 1px; }

    /* ── Time block ── */
    .tok-time { text-align: right; flex: 0 0 auto; }
    .t-hm  { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(240,232,192,.45); white-space: nowrap; }
    .t-ago { margin-top: 3px; }
    .ago-pill {
      display: inline-flex; align-items: center;
      font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 700;
      padding: 2px 7px; border-radius: 999px;
      background: rgba(255,204,0,.10); border: 1px solid rgba(255,204,0,.20); color: #ffcc00;
      white-space: nowrap;
    }
    /* NEW pill (< 30 min) */
    .new-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 700; letter-spacing: .10em;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(90,255,160,.15); border: 1px solid rgba(90,255,160,.35); color: #5affaa;
      animation: blink 1.2s ease-in-out infinite;
    }

    /* ── Metrics row ── */
    .tok-metrics { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    /* Metric chip base */
    .mc { display: inline-flex; flex-direction: column; align-items: flex-start; padding: 5px 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,.07); background: rgba(255,255,255,.04); min-width: 0; }
    .mc-lbl { font-family: "JetBrains Mono", monospace; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: rgba(240,232,192,.38); line-height: 1; }
    .mc-val { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 700; color: rgba(240,232,192,.90); margin-top: 2px; line-height: 1; }

    /* Call MC: blue tint */
    .mc.call { background: rgba(120,180,255,.07); border-color: rgba(120,180,255,.18); }
    .mc.call .mc-val { color: rgba(140,195,255,.95); }

    /* Now / ATH: green tint */
    .mc.now, .mc.ath { background: rgba(90,255,160,.06); border-color: rgba(90,255,160,.15); }
    .mc.now .mc-val, .mc.ath .mc-val { color: rgba(130,255,190,.95); }

    /* ATHx: hero metric */
    .mc.athx {
      background: rgba(255,204,0,.10); border-color: rgba(255,204,0,.28);
      padding: 6px 11px;
    }
    .mc.athx .mc-lbl { color: rgba(255,204,0,.60); }
    .mc.athx .mc-val { font-size: 16px; color: #ffcc00; }
    .mc.athx.hot { background: rgba(90,255,100,.12); border-color: rgba(90,255,100,.35); }
    .mc.athx.hot .mc-lbl { color: rgba(120,255,140,.60); }
    .mc.athx.hot .mc-val { color: #7aff9a; }
    .mc.athx.cold { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
    .mc.athx.cold .mc-val { color: rgba(240,232,192,.45); }

    /* Since: green if > 1, muted if < 1 */
    .mc.since { background: rgba(90,255,160,.06); border-color: rgba(90,255,160,.15); }
    .mc.since .mc-val { color: rgba(130,255,190,.95); }
    .mc.since.down { background: rgba(255,100,100,.06); border-color: rgba(255,100,100,.14); }
    .mc.since.down .mc-val { color: rgba(255,150,150,.75); }

    /* ── Callers + Links row ── */
    .tok-sub { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }

    /* Tiny pill (caller / link) */
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: "JetBrains Mono", monospace; font-size: 10px;
      padding: 3px 9px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.09); background: rgba(255,255,255,.04);
      color: rgba(240,232,192,.75); white-space: nowrap;
      transition: border-color .12s, color .12s;
    }
    .chip:hover { border-color: rgba(255,204,0,.35); color: #ffcc00; }
    .chip b { font-weight: 700; color: rgba(240,232,192,.50); margin-right: 1px; }

    /* Caller chip: reddish tint */
    .chip.caller { background: rgba(255,120,120,.07); border-color: rgba(255,120,120,.18); color: rgba(255,190,190,.88); }
    .chip.caller:hover { border-color: rgba(255,100,100,.40); color: #ff9898; }
    .chip.caller b { color: rgba(255,160,160,.55); }

    /* Link chip: gold tint */
    .chip.link { background: rgba(255,204,0,.06); border-color: rgba(255,204,0,.16); color: rgba(240,220,140,.88); }
    .chip.link:hover { border-color: rgba(255,204,0,.40); color: #ffcc00; }

    /* ── Sort bar ── */
    .col-sort {
      flex: 0 0 auto;
      display: flex; gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      background: rgba(0,0,0,.15);
    }
    .sort-btn {
      font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,.08);
      background: transparent; color: rgba(240,232,192,.40); cursor: pointer;
      transition: all .15s;
    }
    .sort-btn:hover  { border-color: rgba(255,204,0,.30); color: rgba(255,204,0,.80); }
    .sort-btn.active { border-color: rgba(255,204,0,.45); background: rgba(255,204,0,.10); color: #ffcc00; }

    /* ── Callers count badge ── */
    .kols-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 700;
      padding: 3px 8px; border-radius: 999px;
      background: rgba(200,160,255,.09); border: 1px solid rgba(200,160,255,.22); color: rgba(210,180,255,.85);
    }

    /* ── Leaderboard strip ── */
    .lb-wrap {
      flex: 0 0 auto;
      margin-bottom: 12px;
      border: 1px solid rgba(255,204,0,.14);
      border-radius: 12px;
      background: rgba(12,12,14,.80);
      overflow: hidden;
    }
    .lb-head {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(255,204,0,.04);
    }
    .lb-title {
      font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .16em;
      text-transform: uppercase; font-weight: 700; color: rgba(255,204,0,.70);
    }
    .lb-sub {
      font-family: "JetBrains Mono", monospace; font-size: 9px;
      color: rgba(240,232,192,.28); letter-spacing: .06em;
    }
    .lb-body {
      display: flex; gap: 0; overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none;
    }
    .lb-body::-webkit-scrollbar { display: none; }
    .lb-item {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 11px;
      padding: 12px 18px;
      border-right: 1px solid rgba(255,255,255,.05);
      min-width: 200px; max-width: 260px;
      transition: background .12s;
      cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .lb-item:last-child { border-right: none; }
    .lb-item:hover { background: rgba(255,204,0,.06); }
    .lb-rank {
      font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700;
      color: rgba(240,232,192,.25); min-width: 22px; text-align: right;
    }
    .lb-rank.gold   { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,.4); }
    .lb-rank.silver { color: rgba(200,200,220,.80); }
    .lb-rank.bronze { color: rgba(210,160,110,.80); }
    .lb-av {
      width: 38px; height: 38px; flex: 0 0 38px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lb-av-ph { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700; color: rgba(255,204,0,.55); }
    .lb-info { min-width: 0; flex: 1; }
    .lb-ticker {
      font-weight: 800; font-size: 14px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .lb-meta {
      display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: nowrap;
    }
    .lb-athx {
      font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 700;
    }
    .lb-athx.hot  { color: #7aff9a; }
    .lb-athx.warm { color: #ffcc00; }
    .lb-athx.cold { color: rgba(240,232,192,.45); }
    .lb-since {
      font-family: "JetBrains Mono", monospace; font-size: 10px;
      color: rgba(240,232,192,.40);
    }

    /* ── Token detail modal ── */
    .tok-modal-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    .tok-modal-overlay.closing { animation: fadeOut .15s ease forwards; }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
    .tok-modal {
      width: min(560px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      border-radius: 18px;
      border: 1px solid rgba(255,204,0,.20);
      background: #0e0e10;
      box-shadow: 0 24px 80px rgba(0,0,0,.80);
      animation: slideUp .18s ease;
    }
    @keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
    .tok-modal::-webkit-scrollbar { width: 4px; }
    .tok-modal::-webkit-scrollbar-thumb { background: rgba(255,204,0,.20); border-radius: 4px; }

    .m-top-bar {
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,204,0,.60), transparent);
    }
    .m-head {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .m-av {
      width: 56px; height: 56px; flex: 0 0 56px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .m-av img { width: 100%; height: 100%; object-fit: cover; }
    .m-av-ph { font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 700; color: rgba(255,204,0,.55); }
    .m-title-block { flex: 1; min-width: 0; }
    .m-ticker {
      font-weight: 900; font-size: 22px; color: #fff; letter-spacing: .01em;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .m-mint { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(240,232,192,.28); margin-top: 4px; }
    .m-close-btn {
      flex: 0 0 auto; width: 30px; height: 30px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(240,232,192,.50); font-size: 16px;
      transition: background .12s, color .12s;
    }
    .m-close-btn:hover { background: rgba(255,100,100,.12); color: #ff9898; }

    .m-metrics {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .m-section {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .m-section:last-child { border-bottom: none; }
    .m-sec-title {
      font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: .16em;
      text-transform: uppercase; color: rgba(240,232,192,.35); margin-bottom: 10px;
    }
    .m-caller-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .m-caller-row:last-child { border-bottom: none; }
    .m-caller-idx {
      font-family: "JetBrains Mono", monospace; font-size: 9px;
      color: rgba(240,232,192,.25); min-width: 16px;
    }
    .m-caller-name {
      font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 600;
      color: rgba(255,190,190,.88); flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-caller-name a { color: inherit; }
    .m-caller-name a:hover { color: #ffcc00; }
    .m-caller-mc {
      font-family: "JetBrains Mono", monospace; font-size: 11px; color: rgba(140,195,255,.90);
    }
    .m-caller-ts {
      font-family: "JetBrains Mono", monospace; font-size: 10px;
      color: rgba(240,232,192,.30); white-space: nowrap;
    }
    .m-caller-sx {
      font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700;
      color: rgba(130,255,190,.90); white-space: nowrap;
    }
    .m-caller-sx.down { color: rgba(255,150,150,.75); }
    .m-links { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Chain indicator badge ── */
    .chain-badge {
      display: inline-flex; align-items: center;
      font-family: "JetBrains Mono", monospace; font-size: 8px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 999px; white-space: nowrap; flex: 0 0 auto;
    }
    .chain-sol  { background: rgba(153,69,255,.13); border: 1px solid rgba(153,69,255,.30); color: rgba(195,150,255,.95); }
    .chain-eth  { background: rgba(98,126,234,.13); border: 1px solid rgba(98,126,234,.32); color: rgba(160,180,255,.95); }
    .chain-base { background: rgba(0,130,255,.12);  border: 1px solid rgba(0,130,255,.30);  color: rgba(100,185,255,.95); }
    .col-empty { padding: 28px 16px; text-align: center; }
    .col-empty-icon { font-size: 24px; opacity: .35; }
    .col-empty-txt { margin-top: 8px; font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(240,232,192,.35); letter-spacing: .10em; text-transform: uppercase; }

    /* ── Error ── */
    .col-err { padding: 14px 16px; font-family: "JetBrains Mono", monospace; font-size: 11px; color: rgba(255,130,130,.85); }

    /* ── Full-page loader ── */
    .page-loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: rgba(9,9,9,.92); backdrop-filter: blur(8px);
    }
    .page-loader.gone { display: none; }
    .loader-box {
      width: min(420px, calc(100% - 40px));
      border: 1px solid rgba(255,204,0,.18); border-radius: 16px;
      background: rgba(0,0,0,.35); padding: 20px;
    }
    .loader-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(240,232,192,.60); display: flex; justify-content: space-between; align-items: center; }
    .loader-bar { margin-top: 14px; height: 3px; border-radius: 999px; background: rgba(255,255,255,.07); overflow: hidden; }
    .loader-bar i {
      display: block; height: 100%; width: 40%;
      background: linear-gradient(90deg, transparent, rgba(255,204,0,.70), transparent);
      transform: translateX(-150%);
      animation: sweep 1.1s ease-in-out infinite;
    }
    @keyframes sweep { 0%{transform:translateX(-150%)} 100%{transform:translateX(300%)} }
  </style>
</head>

    <!-- 3 columns -->
    <div class="cols">

      <div class="col-card mid">
        <div class="col-head">
          <div>
            <div class="col-title">Mid Cap</div>

          </div>
          <div class="col-meta">
            <span class="col-count" id="cnt_100k">—</span>
            <span class="live-pill"><span class="live-dot"></span>LIVE</span>
          </div>
        </div>
        <div class="col-sort">
          <button class="sort-btn active" onclick="setSort('100k','newest',this)">Newest</button>
          <button class="sort-btn" onclick="setSort('100k','athx',this)">ATHx</button>
          <button class="sort-btn" onclick="setSort('100k','since',this)">Since</button>
        </div>

      </div>

      <div class="col-card big">
        <div class="col-head">
          <div>
            <div class="col-title">1M+ Cap</div>
            <div class="col-range" style="margin-top:3px;">MC@call &gt; 1M</div>
          </div>
          <div class="col-meta">
            <span class="col-count" id="cnt_1m">—</span>
            <span class="live-pill"><span class="live-dot"></span>LIVE</span>
          </div>
        </div>
        <div class="col-sort">
          <button class="sort-btn active" onclick="setSort('1m','newest',this)">Newest</button>
          <button class="sort-btn" onclick="setSort('1m','athx',this)">ATHx</button>
          <button class="sort-btn" onclick="setSort('1m','since',this)">Since</button>
        </div>
        <div class="col-body" id="b_1m"></div>
      </div>

    </div>
  </div>

  <script>
    /* ── Helpers ── */
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}

    /* Image fallback cascade: dex CDN → Raydium (SOL only) → letter placeholder */
    function imgFallback(img, mint, chain, ticker){
      var tried = parseInt(img.dataset.tried||"0", 10);
      img.dataset.tried = tried + 1;
      var chainMap = {sol:"solana", eth:"ethereum", base:"base"};
      var ds = chainMap[chain]||"solana";
      var fallbacks = [
        "https://dd.dexscreener.com/ds-data/tokens/"+ds+"/"+mint+".png",
      ];
      if(chain==="sol"||!chain) fallbacks.push("https://img.raydium.io/icon/"+mint+".png");
      if(tried < fallbacks.length){
        img.src = fallbacks[tried];
      } else {
        var ph = document.createElement("span");
        ph.className = "tok-av-placeholder";
        ph.textContent = String(ticker||"?").slice(0,2).toUpperCase();
        if(img.parentNode) img.parentNode.replaceChild(ph, img);
      }
    }
    function _pad2(n){n=Number(n||0);return n<10?("0"+n):(""+n);}
    function _parseDate(v){
      try{
        if(!v&&v!==0) return null;
        var s=String(v).trim(); if(!s) return null;
        if(/^\d{10,13}$/.test(s)){var n=parseInt(s,10);if(s.length===10)n*=1000;var d0=new Date(n);if(!isNaN(d0.getTime()))return d0;}
        var d=new Date(s); if(!isNaN(d.getTime())) return d;
      }catch(e){}
      return null;
    }
    function hoursAgo(v){
      var d=_parseDate(v); if(!d) return null;
      var s=(Date.now()-d.getTime())/1000; if(s<0) return null;
      if(s<60) return Math.round(s)+"s ago";
      if(s<3600) return Math.round(s/60)+"m ago";
      var h=s/3600; if(h<24) return h.toFixed(1)+"h ago";
      return Math.floor(h/24)+"d "+Math.round(h%24)+"h ago";
    }
    function isNew(v){var d=_parseDate(v);if(!d)return false;return (Date.now()-d.getTime())/60000 < 30;}
    function fmtHour(v){var d=_parseDate(v);if(!d)return "";return _pad2(d.getUTCHours())+":"+_pad2(d.getUTCMinutes())+" UTC";}
    function fmtMc(n){
      if(n===null||n===undefined) return "—";
      var v=Number(n); if(!isFinite(v)||v<=0) return "—";
      if(v>=1e9) return "$"+(v/1e9).toFixed(2)+"B";
      if(v>=1e6) return "$"+(v/1e6).toFixed(2)+"M";
      if(v>=1e3) return "$"+(v/1e3).toFixed(1)+"K";
      return "$"+Math.round(v);
    }
    function fmtX(x){
      if(x===null||x===undefined) return "—";
      var v=Number(x); if(!isFinite(v)||v<=0) return "—";
      if(v>=100) return Math.round(v)+"x";
      if(v>=10)  return v.toFixed(1)+"x";
      return v.toFixed(2)+"x";
    }
    function athxClass(v){
      var n=Number(v||0);
      if(!isFinite(n)||n<=0) return "athx cold";
      if(n>=3) return "athx hot";
      if(n>=1) return "athx";
      return "athx cold";
    }
    function sinceClass(v){
      var n=Number(v||0);
      return (isFinite(n)&&n>=1) ? "since" : "since down";
    }

    /* ── Sort state ── */
    var _data  = {low:[], "100k":[], "1m":[]};
    var _sorts = {low:"newest", "100k":"newest", "1m":"newest"};

    function sortItems(items, mode){
      var arr = items.slice();
      if(mode === "athx")   arr.sort(function(a,b){ return (Number(b.ath_x||0))-(Number(a.ath_x||0)); });
      else if(mode === "since") arr.sort(function(a,b){ return (Number(b.since_x||0))-(Number(a.since_x||0)); });
      /* newest: keep original API order (already sorted by latest call time) */
      return arr;
    }

    function setSort(colKey, mode, btn){
      _sorts[colKey] = mode;
      /* update active button within this column's sort bar */
      if(btn){
        var bar = btn.parentNode;
        bar.querySelectorAll(".sort-btn").forEach(function(b){ b.classList.remove("active"); });
        btn.classList.add("active");
      }
      paintBucket(colKey);
    }

    /* ── Render one bucket from stored data ── */
    function paintBucket(colKey){
      var elId  = "b_"  + colKey;
      var cntId = "cnt_"+ colKey;
      var items = sortItems(_data[colKey], _sorts[colKey]);
      var el    = document.getElementById(elId);
      var cntEl = document.getElementById(cntId);
      if(cntEl) cntEl.textContent = items.length ? items.length+" alerts" : "—";
      if(!items.length){
        el.innerHTML='<div class="col-empty"><div class="col-empty-icon">📡</div><div class="col-empty-txt">Waiting for signal</div></div>';
        return;
      }
      var html="";
      items.forEach(function(r){
        var chart  = r.chart_url||"";
        var av     = (r.thumb_url||"").trim();
        var ticker = r.ticker||"TOKEN";
        var chain  = (r.chain||"sol").toLowerCase();
        var chainLabel = chain==="eth"?"ETH":chain==="base"?"BASE":"SOL";
        var chainCls   = "chain-badge chain-"+chain;
        var _ts    = r.call_ts||"";
        var _ago   = hoursAgo(_ts);
        var _hr    = fmtHour(_ts);
        var _isNew = isNew(_ts);
        var mintShort = r.mint ? r.mint.slice(0,4)+"…"+r.mint.slice(-4) : "";
        var callers   = Array.isArray(r.callers) ? r.callers : [];
        var nKols     = callers.length || (r.caller ? 1 : 0);
        var axCls = athxClass(r.ath_x);
        var siCls = sinceClass(r.since_x);

        var avHtml = av
          ? '<img src="'+esc(av)+'" loading="lazy" alt="" onerror="imgFallback(this,\''+esc(r.mint||'')+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
          : (r.mint
              ? '<img src="https://dd.dexscreener.com/ds-data/tokens/'+(chain==="eth"?"ethereum":chain==="base"?"base":"solana")+'/'+esc(r.mint)+'.png" loading="lazy" alt="" onerror="imgFallback(this,\''+esc(r.mint||'')+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
              : '<span class="tok-av-placeholder">'+esc(ticker.slice(0,2).toUpperCase())+'</span>');

        html += '<div class="tok'+(_isNew?' is-new':'')+'">'; // open

        /* ── header: avatar + name + time */
        html += '<div class="tok-head">';
        html +=   '<div class="tok-id">';
        html +=     '<div class="tok-av">'+avHtml+'</div>';
        html +=     '<div class="tok-names">';
        html +=       '<div class="tok-ticker" style="display:flex;align-items:center;gap:6px;">'+(chart?('<a href="'+esc(chart)+'" target="_blank" rel="noreferrer">'+esc(ticker)+'</a>'):esc(ticker))+'<span class="'+esc(chainCls)+'">'+esc(chainLabel)+'</span></div>';
        if(mintShort) html += '<div class="tok-mint">'+esc(mintShort)+'</div>';
        html +=     '</div>';
        html +=   '</div>';
        html +=   '<div class="tok-time">';
        if(_hr) html += '<div class="t-hm">'+esc(_hr)+'</div>';
        html +=   '<div class="t-ago">';
        if(_isNew) html += '<span class="new-pill"><span class="live-dot" style="width:5px;height:5px;"></span>NEW</span>';
        else if(_ago) html += '<span class="ago-pill">'+esc(_ago)+'</span>';
        html +=   '</div></div>';
        html += '</div>'; // tok-head

        /* ── metrics */
        html += '<div class="tok-metrics">';
        html +=   '<div class="mc call"><span class="mc-lbl">MC@call</span><span class="mc-val">'+esc(fmtMc(r.call_mc))+'</span></div>';
        html +=   '<div class="mc ath"><span class="mc-lbl">ATH</span><span class="mc-val">'+esc(fmtMc(r.ath_mc))+'</span></div>';
        html +=   '<div class="mc '+esc(axCls)+'"><span class="mc-lbl">ATHx</span><span class="mc-val">'+esc(fmtX(r.ath_x))+'</span></div>';
        if(nKols>1) html += '<span class="kols-badge">👥 '+nKols+' KOLs</span>';
        html += '</div>';

        /* ── callers */
        var callerHtml = "";
        if(callers.length){
          callerHtml = callers.slice(0,3).map(function(c){
            var cl = c.x ? "https://x.com/"+String(c.x).replace(/^@/,"") : "";
            var lb = c.name||c.x||"caller";
            return cl
              ? '<a class="chip caller" href="'+esc(cl)+'" target="_blank" rel="noreferrer"><b>@</b>'+esc(lb)+'</a>'
              : '<span class="chip caller"><b>@</b>'+esc(lb)+'</span>';
          }).join("");
        } else if(r.caller_x||r.caller){
          var cl2 = r.caller_x ? "https://x.com/"+String(r.caller_x).replace(/^@/,"") : "";
          var lb2 = r.caller||r.caller_x||"caller";
          callerHtml = cl2
            ? '<a class="chip caller" href="'+esc(cl2)+'" target="_blank" rel="noreferrer"><b>@</b>'+esc(lb2)+'</a>'
            : '<span class="chip caller"><b>@</b>'+esc(lb2)+'</span>';
        }

        /* ── links */
        var linksHtml="";
        if(chart)            linksHtml+='<a class="chip link" href="'+esc(chart)+'" target="_blank" rel="noreferrer">Chart</a>';
        if(r.dex_url)        linksHtml+='<a class="chip link" href="'+esc(r.dex_url)+'" target="_blank" rel="noreferrer">Dex</a>';
        if(r.token_x_url)    linksHtml+='<a class="chip" href="'+esc(r.token_x_url)+'" target="_blank" rel="noreferrer">X</a>';
        if(r.token_site_url) linksHtml+='<a class="chip" href="'+esc(r.token_site_url)+'" target="_blank" rel="noreferrer">Site</a>';

        if(callerHtml||linksHtml) html+='<div class="tok-sub">'+callerHtml+linksHtml+'</div>';
        html += '</div>'; // tok close
      });
      el.innerHTML = html;
    }

    function renderBucket(colKey, items){ _data[colKey]=items||[]; paintBucket(colKey); paintLeaderboard(); }

    /* ── Token detail modal ── */
    var _lbData = [];  // top-10 snapshot for modal lookup
    function openModal(idx){
      var r = _lbData[idx]; if(!r) return;
      var modal = document.getElementById("tokModal");
      if(!modal) return;

      var chain = (r.chain||"sol").toLowerCase();
      var chainLabel = chain==="eth"?"ETH":chain==="base"?"BASE":"SOL";
      var chainCls   = "chain-badge chain-"+chain;
      var ds = chain==="eth"?"ethereum":chain==="base"?"base":"solana";
      var mint = r.mint||"";
      var ticker = r.ticker||"?";
      var av = (r.thumb_url||"").trim();
      var avHtml = av
        ? '<img src="'+esc(av)+'" alt="" onerror="imgFallback(this,\''+esc(mint)+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
        : (mint
            ? '<img src="https://dd.dexscreener.com/ds-data/tokens/'+ds+'/'+esc(mint)+'.png" alt="" onerror="imgFallback(this,\''+esc(mint)+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
            : '<span class="m-av-ph">'+esc(ticker.slice(0,2).toUpperCase())+'</span>');

      var ax = Number(r.ath_x||0);
      var sx = Number(r.since_x||0);
      var axCls = athxClass(r.ath_x);
      var siCls = sinceClass(r.since_x);
      var mintShort = mint ? mint.slice(0,6)+"…"+mint.slice(-6) : "";

      // Sort callers ascending by call_ts so index 0 = genuinely the earliest caller
      var callers = (Array.isArray(r.callers)?r.callers.slice():[]).sort(function(a,b){
        var da = _parseDate(a.call_ts), db = _parseDate(b.call_ts);
        if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
        return da.getTime()-db.getTime();
      });

      // Derive "first call MC" from the earliest caller, fall back to r.call_mc
      var firstCallMc = (callers.length && callers[0].call_mc) ? callers[0].call_mc : r.call_mc;
      // "latest call MC" from r.call_mc (most recent call within the 24h window)
      var latestCallMc = r.call_mc;
      // Recompute ATHx from the earliest call MC for accuracy
      var firstAthX = (r.ath_mc && firstCallMc && firstCallMc>0) ? r.ath_mc/firstCallMc : ax;
      var firstAxCls = athxClass(firstAthX);

      // Build callers table (sorted earliest → latest)
      var callersHtml = "";
      if(callers.length){
        callers.forEach(function(c,i){
          var name = c.name||c.x||"caller";
          var xUrl = c.x ? "https://x.com/"+String(c.x).replace(/^@/,"") : "";
          var nameHtml = xUrl
            ? '<a href="'+esc(xUrl)+'" target="_blank" rel="noreferrer">@'+esc(name)+'</a>'
            : '@'+esc(name);
          var cmc  = fmtMc(c.call_mc);
          var cago = hoursAgo(c.call_ts)||"—";
          var csx  = Number(c.since_x||0);
          var cSxCls = (csx>=1)?"m-caller-sx":"m-caller-sx down";
          var cSxTxt = csx>0 ? fmtX(csx)+" now" : "—";
          callersHtml += '<div class="m-caller-row">';
          callersHtml +=   '<span class="m-caller-idx">'+(i===0?"🥇":i===1?"🥈":i===2?"🥉":"·")+'</span>';
          callersHtml +=   '<span class="m-caller-name">'+nameHtml+'</span>';
          callersHtml +=   '<span class="m-caller-mc">'+esc(cmc)+'</span>';
          callersHtml +=   '<span class="'+esc(cSxCls)+'">'+esc(cSxTxt)+'</span>';
          callersHtml +=   '<span class="m-caller-ts">'+esc(cago)+'</span>';
          callersHtml += '</div>';
        });
      } else if(r.caller){
        var xUrl2 = r.caller_x ? "https://x.com/"+String(r.caller_x).replace(/^@/,"") : "";
        var nameHtml2 = xUrl2
          ? '<a href="'+esc(xUrl2)+'" target="_blank" rel="noreferrer">@'+esc(r.caller)+'</a>'
          : '@'+esc(r.caller);
        callersHtml = '<div class="m-caller-row"><span class="m-caller-idx">🥇</span><span class="m-caller-name">'+nameHtml2+'</span><span class="m-caller-mc">'+esc(fmtMc(r.call_mc))+'</span><span class="m-caller-ts">'+esc(hoursAgo(r.call_ts)||"—")+'</span></div>';
      } else {
        callersHtml = '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:rgba(240,232,192,.30);">No caller data</div>';
      }

      // Links
      var linksHtml = "";
      if(r.chart_url)     linksHtml += '<a class="chip link" href="'+esc(r.chart_url)+'" target="_blank" rel="noreferrer">📈 Chart</a>';
      if(r.dex_url)       linksHtml += '<a class="chip link" href="'+esc(r.dex_url)+'" target="_blank" rel="noreferrer">🔍 Dex</a>';
      if(r.token_x_url)   linksHtml += '<a class="chip" href="'+esc(r.token_x_url)+'" target="_blank" rel="noreferrer">𝕏 Twitter</a>';
      if(r.token_site_url)linksHtml += '<a class="chip" href="'+esc(r.token_site_url)+'" target="_blank" rel="noreferrer">🌐 Site</a>';
      if(mint) linksHtml += '<button class="chip" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+esc(mint)+'\');this.textContent=\'✓ Copied!\';setTimeout(()=>{this.textContent=\'📋 Copy CA\'},1200);">📋 Copy CA</button>';

      // Show firstCallMc chip only if different from latestCallMc
      var firstChip = '<div class="mc call"><span class="mc-lbl">🥇 first call</span><span class="mc-val">'+esc(fmtMc(firstCallMc))+'</span></div>';
      var latestChip = (latestCallMc && latestCallMc !== firstCallMc)
        ? '<div class="mc call" style="opacity:.65;"><span class="mc-lbl">latest call</span><span class="mc-val">'+esc(fmtMc(latestCallMc))+'</span></div>'
        : "";

      modal.className = "tok-modal-overlay";
      modal.style.display = "flex";
      modal.innerHTML =
        '<div class="tok-modal" onclick="event.stopPropagation()">'+
          '<div class="m-top-bar"></div>'+
          '<div class="m-head">'+
            '<div class="m-av">'+avHtml+'</div>'+
            '<div class="m-title-block">'+
              '<div class="m-ticker">'+esc(ticker)+'<span class="'+esc(chainCls)+'">'+esc(chainLabel)+'</span></div>'+
              (mint?'<div class="m-mint" title="'+esc(mint)+'">'+esc(mintShort)+'</div>':"")+
            '</div>'+
            '<div class="m-close-btn" onclick="closeModal()">✕</div>'+
          '</div>'+
          '<div class="m-metrics">'+
            firstChip+
            latestChip+
            '<div class="mc now"><span class="mc-lbl">Now</span><span class="mc-val">'+esc(fmtMc(r.cur_mc))+'</span></div>'+
            '<div class="mc ath"><span class="mc-lbl">ATH</span><span class="mc-val">'+esc(fmtMc(r.ath_mc))+'</span></div>'+
            '<div class="mc '+esc(siCls)+'"><span class="mc-lbl">Since</span><span class="mc-val">'+esc(fmtX(r.since_x))+'</span></div>'+
            '<div class="mc '+esc(firstAxCls)+'"><span class="mc-lbl">ATHx</span><span class="mc-val">'+esc(fmtX(firstAthX))+'</span></div>'+
          '</div>'+
          (callersHtml?'<div class="m-section"><div class="m-sec-title">Callers · '+callers.length+' total · earliest first</div>'+callersHtml+'</div>':"")+
          (linksHtml?'<div class="m-section"><div class="m-sec-title">Links</div><div class="m-links">'+linksHtml+'</div></div>':"")+
        '</div>';

      document.body.style.overflow = "hidden";
    }

    function closeModal(){
      var modal = document.getElementById("tokModal");
      if(!modal) return;
      modal.className = "tok-modal-overlay closing";
      setTimeout(function(){
        modal.style.display = "none";
        modal.innerHTML = "";
        document.body.style.overflow = "";
      }, 150);
    }

    document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });

    /* ── Leaderboard: top 10 tokens by ATHx across all buckets ── */
    function paintLeaderboard(){
      var all = (_data.low||[]).concat(_data["100k"]||[]).concat(_data["1m"]||[]);
      all.sort(function(a,b){ return (Number(b.ath_x||0))-(Number(a.ath_x||0)); });
      _lbData = all.slice(0,10);
      var wrap = document.getElementById("lbWrap");
      var body = document.getElementById("lbBody");
      if(!wrap||!body) return;
      if(!_lbData.length){ wrap.style.display="none"; return; }
      wrap.style.display="";
      var rankClass = ["gold","gold","gold","silver","silver","silver","bronze","bronze","bronze","bronze"];
      var html="";
      _lbData.forEach(function(r, i){
        var ax = Number(r.ath_x||0);
        var sx = Number(r.since_x||0);
        var axCls = ax>=5?"hot":ax>=2?"warm":"cold";
        var chain = (r.chain||"sol").toLowerCase();
        var chainLabel = chain==="eth"?"ETH":chain==="base"?"BASE":"SOL";
        var chainCls = "chain-badge chain-"+chain;
        var av = (r.thumb_url||"").trim();
        var ticker = r.ticker||"?";
        var mint = r.mint||"";
        var ds = chain==="eth"?"ethereum":chain==="base"?"base":"solana";

        var avHtml = av
          ? '<img src="'+esc(av)+'" loading="lazy" alt="" onerror="imgFallback(this,\''+esc(mint)+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
          : (mint
              ? '<img src="https://dd.dexscreener.com/ds-data/tokens/'+ds+'/'+esc(mint)+'.png" loading="lazy" alt="" onerror="imgFallback(this,\''+esc(mint)+'\',\''+esc(chain)+'\',\''+esc(ticker)+'\')" />'
              : '<span class="lb-av-ph">'+esc(ticker.slice(0,2).toUpperCase())+'</span>');

        html += '<div class="lb-item" onclick="openModal('+i+')" role="button" tabindex="0">';
        html +=   '<div class="lb-rank '+esc(rankClass[i]||'')+'">#'+(i+1)+'</div>';
        html +=   '<div class="lb-av">'+avHtml+'</div>';
        html +=   '<div class="lb-info">';
        html +=     '<div class="lb-ticker">'+esc(ticker)+'<span class="'+esc(chainCls)+'">'+esc(chainLabel)+'</span></div>';
        html +=     '<div class="lb-meta">';
        html +=       '<span class="lb-athx '+esc(axCls)+'">'+esc(fmtX(ax))+'</span>';
        if(sx>0) html += '<span class="lb-since">now '+esc(fmtX(sx))+'</span>';
        html +=     '</div>';
        html +=   '</div>';
        html += '</div>';
      });
      body.innerHTML = html;
    }

    /* ── Fetch + refresh ── */
    async function fetchJ(url, ms){
      var ctrl=null, timer=null;
      try{
        if(typeof AbortController!=="undefined"){ctrl=new AbortController();timer=setTimeout(function(){try{ctrl.abort();}catch(e){}},ms);}
        var res=await fetch(url,{credentials:"include",signal:ctrl?ctrl.signal:undefined});
        if(timer) clearTimeout(timer);
        if(!res.ok) throw new Error("HTTP "+res.status);
        return await res.json();
      }catch(e){if(timer)clearTimeout(timer);throw e;}
    }

    var _busy=false, _first=true;
    async function refresh(){
      if(_busy) return;
      _busy=true;
      try{
        var d;
        try{ d=await fetchJ("/api/kol/dashboard?hours=24&per_bucket=50",20000); }
        catch(e1){ d=await fetchJ("/api/kol/dashboard?hours=24&per_bucket=30",12000); }
        var b=(d&&d.buckets)||{};
        renderBucket("low",   b.low||[]);
        renderBucket("100k",  b["100k"]||[]);
        renderBucket("1m",    b["1m"]||[]);
        var ts=document.getElementById("updateTs");
        if(ts){ var now=new Date(); ts.textContent="Updated "+_pad2(now.getUTCHours())+":"+_pad2(now.getUTCMinutes())+":"+_pad2(now.getUTCSeconds())+" UTC"; }
      }catch(e){
        var msg=/AbortError|aborted/i.test(String(e&&(e.name||e.message||e)))?"Timeout — retrying…":"Load error: "+String(e||"");
        ["b_low","b_100k","b_1m"].forEach(function(id){document.getElementById(id).innerHTML='<div class="col-err">'+esc(msg)+'</div>';});
      }finally{
        _busy=false;
        if(_first){
          _first=false;
          var pl=document.getElementById("pageLoader");
          if(pl){pl.classList.add("gone");pl.setAttribute("aria-busy","false");}
        }
      }
    }
    refresh();
    setInterval(refresh, 20000);
  </script>

  </div>
