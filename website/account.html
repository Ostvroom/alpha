<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Account</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(980px,100%);margin:0 auto;padding:18px 22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80);display:inline-block;cursor:pointer;background:transparent}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .btn.primary{background:rgba(255,204,0,.12);border-color:rgba(255,204,0,.38);color:#ffcc00}
    .grid{margin-top:14px;display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{border:1px solid rgba(255,204,0,.18);border-radius:14px;background:rgba(9,9,9,.7);overflow:hidden}
    .card.span12{grid-column:span 12}
    .ph{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.12);display:flex;justify-content:space-between;align-items:center}
    .pt{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.70)}
    .ps{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .pb{padding:14px 16px}
    .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .av{width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,204,0,.22);background:rgba(255,204,0,.06);overflow:hidden}
    .av img{width:100%;height:100%;object-fit:cover;display:block}
    .h1{font-weight:900;color:#ffcc00;font-size:18px;line-height:1.2}
    .meta{margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.55)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;
      font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid rgba(255,204,0,.12);background:rgba(255,204,0,.08);color:rgba(240,232,192,.88)}
    .badge b{font-weight:800;color:#ffcc00}
    .badge.g{border-color:rgba(120,255,180,.22);background:rgba(120,255,180,.08)}
    .err{padding:12px 14px;color:rgba(255,150,150,.88);font-family:"JetBrains Mono",monospace;font-size:11px}
    .feat{margin:10px 0 0;padding:0;list-style:none}
    .feat li{padding:8px 0;border-bottom:1px solid rgba(255,204,0,.08);font-size:14px;color:rgba(240,232,192,.82);display:flex;gap:10px;align-items:flex-start}
    .feat li:last-child{border-bottom:none}
    .feat li::before{content:"✓";color:#7dffb0;font-weight:800;flex:0 0 auto}
    .lead{font-size:13px;line-height:1.55;color:rgba(240,232,192,.68);margin-top:8px}
    .inp{width:100%;margin-top:8px;padding:11px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.18);background:rgba(0,0,0,.28);color:#f0e8c0;font-family:"JetBrains Mono",monospace;font-size:12px}
    .modal{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center}
    .modal.on{display:flex}
    .modal-back{position:absolute;inset:0;background:rgba(0,0,0,.62)}
    .modal-card{position:relative;width:min(520px,94vw);background:#0b0b0d;border:1px solid rgba(255,204,0,.26);border-radius:14px;box-shadow:0 28px 120px rgba(0,0,0,.78);overflow:hidden}
    .modal-head{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.14);display:flex;justify-content:space-between;align-items:center;gap:12px}
    .modal-title{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,204,0,.92)}
    .modal-close{border:1px solid rgba(255,204,0,.35);background:rgba(255,204,0,.06);color:#ffcc00;width:36px;height:36px;font-size:22px;cursor:pointer;border-radius:8px}
    .modal-body{padding:14px 16px 16px;max-height:70vh;overflow:auto}
    .ok{color:rgba(120,255,180,.92);font-family:"JetBrains Mono",monospace;font-size:11px;margin-top:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/projects"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha · Account</span></a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="/projects">Projects</a>
        <a class="btn" href="/kol-alerts">Token Alerts</a>
        <a class="btn" href="/daily-finds">Daily Finds</a>
        <a class="btn" href="/admin/projects" id="adminBtn" style="display:none;">Admin Panel</a>
        <a class="btn" href="/api/access/discord/start?next=%2Faccount" id="reconnect">Reconnect Discord</a>
      </div>
    </div>

    <div class="grid">
      <div class="card span12">
        <div class="ph">
          <div class="pt">Profile</div>
          <div class="ps" id="tierPill">—</div>
        </div>
        <div class="pb">
          <div class="row">
            <div class="av"><img id="avatar" alt="" /></div>
            <div style="min-width:240px">
              <div class="h1" id="name">—</div>
              <div class="meta" id="uid">—</div>
              <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                <span class="badge"><b>Points</b> <span id="pointsNum">0</span></span>
                <span class="badge" id="premBadge" style="display:none"><b>Premium</b> active</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/community_pulse.js" defer></script>
  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function setText(id, v){ var el=document.getElementById(id); if(el) el.textContent = String(v||"—"); }

    async function load(){
      try{
        var meR = await fetch("/api/me",{credentials:"include"});
        if(!meR.ok){
          document.querySelector(".grid").innerHTML = '<div class="card span12"><div class="pb"><div class="err">Unauthorized. Connect Discord first.</div></div></div>';
          return;
        }
        var me = await meR.json();
        var display = (me.global_name||me.username||"Discord user").trim();
        setText("name", display);
        setText("uid", "Discord ID · " + (me.user_id||"—"));
        setText("pointsNum", me.points||0);
        var prem = !!me.is_premium;
        setText("tierPill", prem ? "Premium" : "Free");
        var pb = document.getElementById("premBadge");
        if (pb) pb.style.display = prem ? "inline-flex" : "none";
        var av = document.getElementById("avatar");
        if(av){
          av.src = (me.avatar_url||"");
          av.onerror = function(){ try{ av.style.display="none"; }catch(e){} };
        }
        try{
          var ar = await fetch("/api/admin/status",{credentials:"include"});
          if (ar.ok){
            var aj = await ar.json();
            var ab = document.getElementById("adminBtn");
            if (ab && aj && aj.is_admin) ab.style.display = "inline-block";
          }
        }catch(e){}
      } catch(e){
        document.querySelector(".grid").innerHTML = '<div class="card span12"><div class="pb"><div class="err">Failed to load.</div></div></div>';
      }
    }

    load();
  </script>
</body>
</html>
