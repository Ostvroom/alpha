<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Account</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(980px,100%);margin:0 auto;padding:18px 22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80)}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .grid{margin-top:14px;display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{border:1px solid rgba(255,204,0,.18);border-radius:14px;background:rgba(9,9,9,.7);overflow:hidden}
    .card.span12{grid-column:span 12}
    .ph{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.12);display:flex;justify-content:space-between;align-items:center}
    .pt{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.70)}
    .ps{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .pb{padding:12px 14px}
    .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .av{width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,204,0,.22);background:rgba(255,204,0,.06);overflow:hidden}
    .av img{width:100%;height:100%;object-fit:cover;display:block}
    .h1{font-weight:900;color:#ffcc00;font-size:18px;line-height:1.2}
    .meta{margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.55)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;
      font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid rgba(255,204,0,.12);background:rgba(255,204,0,.08);color:rgba(240,232,192,.88)}
    .badge b{font-weight:800;color:#ffcc00}
    .task{padding:10px 0;border-bottom:1px solid rgba(255,204,0,.10);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .task:last-child{border-bottom:none}
    .taskTitle{font-weight:800;color:#ffcc00}
    .taskMeta{margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .claimBtn{cursor:pointer}
    .err{padding:12px 14px;color:rgba(255,150,150,.88);font-family:"JetBrains Mono",monospace;font-size:11px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/projects"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha · Account</span></a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="/projects">Projects</a>
        <a class="btn" href="/kol-alerts">Token Alerts</a>
        <a class="btn" href="/daily-finds">Daily Finds</a>
        <a class="btn" href="/api/access/discord/start?next=%2Faccount" id="reconnect">Reconnect Discord</a>
      </div>
    </div>

    <div class="grid">
      <div class="card span12">
        <div class="ph">
          <div class="pt">Profile</div>
          <div class="ps" id="points">—</div>
        </div>
        <div class="pb">
          <div class="row">
            <div class="av"><img id="avatar" alt="" /></div>
            <div style="min-width:240px">
              <div class="h1" id="name">—</div>
              <div class="meta" id="uid">—</div>
              <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                <span class="badge"><b>Points</b> <span id="pointsNum">0</span></span>
                <span class="badge"><b>Day</b> <span id="day">—</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card span12">
        <div class="ph">
          <div class="pt">Tasks · earn points</div>
          <div class="ps">Claim once or daily</div>
        </div>
        <div class="pb" id="tasks"></div>
      </div>

      <div class="card span12">
        <div class="ph">
          <div class="pt">Earn points on X</div>
          <div class="ps">Reply to our tweet → paste link</div>
        </div>
        <div class="pb">
          <div class="meta">Tweet URL</div>
          <input id="tweetUrl" class="btn" style="width:100%;text-transform:none;letter-spacing:.02em;font-family:JetBrains Mono,monospace;background:rgba(0,0,0,.25);text-align:left" placeholder="https://x.com/handle/status/123..." />
          <div style="height:10px"></div>
          <div class="meta">Your reply URL</div>
          <input id="replyUrl" class="btn" style="width:100%;text-transform:none;letter-spacing:.02em;font-family:JetBrains Mono,monospace;background:rgba(0,0,0,.25);text-align:left" placeholder="https://x.com/yourname/status/456..." />
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <a href="#" class="btn" id="claimX">Claim X points</a>
            <span class="ps" id="xStat">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function setText(id, v){ var el=document.getElementById(id); if(el) el.textContent = String(v||"—"); }
    function setHtml(id, v){ var el=document.getElementById(id); if(el) el.innerHTML = v; }

    async function load(){
      try{
        var meR = await fetch("/api/me",{credentials:"include"});
        if(!meR.ok){ setHtml("tasks", '<div class="err">Unauthorized. Please connect Discord first.</div>'); return; }
        var me = await meR.json();
        var display = (me.global_name||me.username||"Discord user").trim();
        setText("name", display);
        setText("uid", "Discord ID · " + (me.user_id||"—"));
        setText("pointsNum", me.points||0);
        setText("points", (me.points||0) + " pts");
        var av = document.getElementById("avatar");
        if(av){
          av.src = (me.avatar_url||"");
          av.onerror = function(){ try{ av.style.display="none"; }catch(e){} };
        }

        var tR = await fetch("/api/tasks",{credentials:"include"});
        if(!tR.ok){ setHtml("tasks", '<div class="err">Could not load tasks.</div>'); return; }
        var d = await tR.json();
        setText("day", d.day||"—");
        var tasks = (d && d.tasks) || [];
        if(!tasks.length){ setHtml("tasks", '<div class="ps">No tasks yet.</div>'); return; }

        var html = "";
        tasks.forEach(function(t){
          var claimed = !!t.claimed;
          var btn = claimed
            ? '<span class="badge"><b>Claimed</b></span>'
            : '<a href="#" class="btn claimBtn" data-task="'+esc(t.id)+'">Claim +'+esc(t.points)+' </a>';
          html += '<div class="task">'
            + '<div>'
              + '<div class="taskTitle">'+esc(t.title||t.id)+'</div>'
              + '<div class="taskMeta">'+esc((t.type||"once").toUpperCase())+' · +'+esc(t.points||0)+' pts</div>'
            + '</div>'
            + '<div>'+btn+'</div>'
          + '</div>';
        });
        setHtml("tasks", html);

        document.querySelectorAll(".claimBtn").forEach(function(a){
          a.addEventListener("click", async function(e){
            e.preventDefault();
            var tid = a.getAttribute("data-task") || "";
            a.textContent = "Claiming…";
            try{
              var r = await fetch("/api/tasks/claim", {
                method:"POST",
                credentials:"include",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({task_id: tid})
              });
              if(!r.ok){
                var txt=""; try{ txt = await r.text(); }catch(e){}
                alert("Failed: " + (txt || ("HTTP " + r.status)));
                return;
              }
              await load();
            } finally {}
          });
        });
      } catch(e){
        setHtml("tasks", '<div class="err">Failed to load dashboard.</div>');
      }
    }
    (function initX(){
      var btn = document.getElementById("claimX");
      if (!btn) return;
      btn.addEventListener("click", async function(e){
        e.preventDefault();
        var tw = String((document.getElementById("tweetUrl")||{}).value || "").trim();
        var rp = String((document.getElementById("replyUrl")||{}).value || "").trim();
        var st = document.getElementById("xStat");
        if (st) st.textContent = "Submitting…";
        try{
          var r = await fetch("/api/x/claim", {
            method:"POST",
            credentials:"include",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({tweet_url: tw, reply_url: rp})
          });
          var txt = "";
          try{ txt = await r.text(); }catch(ex){}
          if(!r.ok){
            if (st) st.textContent = ("Failed: " + (txt||("HTTP "+r.status))).slice(0,160);
            return;
          }
          var js = {};
          try{ js = JSON.parse(txt); }catch(ex){ js = {}; }
          if (st) st.textContent = "Claimed +" + (js.points_awarded||0) + " · Total " + (js.total_points||0);
          await load();
        } catch(ex){
          if (st) st.textContent = "Network error";
        }
      });
    })();
    load();
  </script>
</body>
</html>
