<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha — Daily Finds</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:100%;max-width:1600px;margin:0 auto;padding:18px 22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80)}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .panel{margin-top:14px;border:1px solid rgba(255,204,0,.18);border-radius:14px;background:rgba(9,9,9,.7);overflow:hidden}
    .ph{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.12);display:flex;justify-content:space-between;align-items:center}
    .pt{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.70)}
    .ps{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .pb{padding:10px 14px;max-height:74vh;overflow:auto}
    .hint{padding:12px 14px;color:rgba(240,232,192,.55);font-family:"JetBrains Mono",monospace;font-size:11px;border-bottom:1px solid rgba(255,204,0,.10)}
    .ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .date{background:rgba(0,0,0,.25);border:1px solid rgba(255,204,0,.18);color:#f0e8c0;border-radius:10px;
      padding:8px 10px;font-family:"JetBrains Mono",monospace;font-size:11px;outline:none}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;
      font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid rgba(255,204,0,.12);background:rgba(255,204,0,.08);color:rgba(240,232,192,.88)}
    .badge.k{background:rgba(120,180,255,.10);border-color:rgba(120,180,255,.22)}
    .badge.g{background:rgba(120,255,180,.10);border-color:rgba(120,255,180,.22)}
    .badge.r{background:rgba(255,150,150,.10);border-color:rgba(255,150,150,.22)}
    .badge.p{background:rgba(200,160,255,.10);border-color:rgba(200,160,255,.22)}
    .badge b{font-weight:800;color:#ffcc00}
    .av{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,204,0,.22);background:rgba(255,204,0,.06);overflow:hidden}
    .av img{width:100%;height:100%;object-fit:cover;display:block}
    .handle{font-weight:900;color:#ffcc00}
    .desc{margin-top:6px;color:rgba(240,232,192,.78);font-size:12.8px;line-height:1.35}
    .findsHeader{display:grid;grid-template-columns:46px 1fr 92px 120px 140px;gap:12px;align-items:center;
      padding:10px 0;border-bottom:1px solid rgba(255,204,0,.16)}
    .findsRow{display:grid;grid-template-columns:46px 1fr 92px 120px 140px;gap:12px;align-items:center;
      padding:10px 0;border-bottom:1px solid rgba(255,204,0,.10)}
    .colH{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.45)}
    @media (max-width: 980px){
      .findsHeader,.findsRow{grid-template-columns:46px 1fr}
      .findsHeader .colH{display:none}
      .findsRow .colAge,.findsRow .colFol,.findsRow .colCat{display:none}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha · Daily Finds</span></a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="/projects">Projects</a>
        <a class="btn" href="/kol-alerts">Token Alerts</a>
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <div class="pt">Daily Finds</div>
        <div class="ctrl">
          <input id="day" class="date" type="date" />
          <div class="ps" id="stat">—</div>
        </div>
      </div>
      <div class="pb" id="list"></div>
    </div>
  </div>

  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function fmtTime(iso){try{var d=new Date(iso);if(!isNaN(d.getTime()))return d.toLocaleString();}catch(e){}return iso||"";}
    function fmtAgeDays(n){ if(n===null||n===undefined||n==="") return "—"; return String(n)+"d"; }
    function fmtFollowers(n){
      if (n === null || n === undefined) return "—";
      var v = Number(n);
      if (!isFinite(v)) return "—";
      if (v >= 1e6) return (v/1e6).toFixed(1).replace(/\.0$/,"") + "M";
      if (v >= 1e3) return (v/1e3).toFixed(1).replace(/\.0$/,"") + "k";
      return String(v);
    }
    function badge(label, value, cls){
      var v = (value===null||value===undefined||value==="") ? "—" : String(value);
      return '<span class="badge '+esc(cls||"")+'"><b>'+esc(label)+'</b> '+esc(v)+'</span>';
    }
    function render(items){
      var el=document.getElementById("list");
      if(!items||!items.length){ el.innerHTML='<div class="ps">No finds for this day.</div>'; return; }
      var html="";
      html+='<div class="findsHeader">'
        +'<div></div>'
        +'<div class="colH">Project</div>'
        +'<div class="colH">Age</div>'
        +'<div class="colH">Followers</div>'
        +'<div class="colH">Category</div>'
        +'</div>';
      items.forEach(function(p){
        var url = p.url || "";
        var av = (p.pfp_url||"").trim();
        html+='<div class="findsRow">';
        html+='<div class="av">'+(av?('<img src="'+esc(av)+'" loading="lazy" />'):'')+'</div>';
        html+='<div>';
        html+='<div><a class="handle" href="'+esc(url)+'" target="_blank" rel="noreferrer">@'+esc(p.handle||p.name||"")+'</a></div>';
        if (p.summary) html+='<div class="desc">'+esc(p.summary).slice(0,220)+'</div>';
        html+='<div class="sub" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:8px;">'+badge("ALERT", fmtTime(p.alerted_at||""), "p")+'</div>';
        html+='</div>';
        html+='<div class="colAge">'+badge("AGE", fmtAgeDays(p.age_days), "k")+'</div>';
        html+='<div class="colFol">'+badge("F", fmtFollowers(p.followers), "g")+'</div>';
        html+='<div class="colCat">'+(p.category?('<span class="badge r">'+esc(p.category)+'</span>'):'<span class="ps">—</span>')+'</div>';
        html+='</div>';
      });
      el.innerHTML=html;
    }
    async function refresh(){
      var day = (document.getElementById("day").value || "").trim();
      var r = await fetch("/api/daily-finds?limit=250&day="+encodeURIComponent(day), {credentials:"include"});
      if(!r.ok) return;
      var d = await r.json();
      var items = (d && d.items) || [];
      document.getElementById("stat").textContent = (items.length||0) + " finds";
      render(items);
    }
    (function init(){
      var inp = document.getElementById("day");
      var now = new Date();
      var yyyy = now.getUTCFullYear();
      var mm = String(now.getUTCMonth()+1).padStart(2,"0");
      var dd = String(now.getUTCDate()).padStart(2,"0");
      inp.value = yyyy+"-"+mm+"-"+dd;
      inp.addEventListener("change", refresh);
      refresh();
      setInterval(refresh, 15000);
    })();
  </script>
</body>
</html>
