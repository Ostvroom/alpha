<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090909" />
  <title>Nerds Alpha - Reuse</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#090909;color:#f0e8c0;font-family:Inter,system-ui,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(1200px,100%);margin:0 auto;padding:18px 22px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:30px;height:30px;border:1px solid rgba(255,204,0,.30);border-radius:6px}
    .brand span{font-family:"JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:#ffcc00;font-weight:700;font-size:12px}
    .btn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,204,0,.25);color:rgba(240,232,192,.80)}
    .btn:hover{border-color:rgba(255,204,0,.45);color:#ffcc00}
    .btn.primary{background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.42);color:#ffcc00}
    .panel{margin-top:14px;border:1px solid rgba(255,204,0,.18);border-radius:14px;background:rgba(9,9,9,.72);overflow:hidden}
    .ph{padding:12px 14px;border-bottom:1px solid rgba(255,204,0,.12);display:flex;justify-content:space-between;align-items:center}
    .pt{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,232,192,.70)}
    .ps{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.45)}
    .pb{padding:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .inp{flex:1;min-width:260px;background:rgba(0,0,0,.30);border:1px solid rgba(255,204,0,.2);border-radius:10px;color:#f0e8c0;padding:12px 13px;font-family:"JetBrains Mono",monospace;font-size:12px}
    .act{cursor:pointer;background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.35);border-radius:10px;color:#ffcc00;padding:11px 12px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
    .act:hover{background:rgba(255,204,0,.16)}
    .hint{margin-top:10px;font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.4)}
    .status{margin-top:10px;font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.62)}
    .status.err{color:rgba(255,150,150,.9)}
    .status.ok{color:rgba(120,255,180,.9)}
    .result{margin-top:12px;border-top:1px solid rgba(255,204,0,.12);padding-top:12px}
    .target{font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.65);margin-bottom:8px}
    .item{padding:9px 0;border-bottom:1px solid rgba(255,204,0,.08);display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center}
    .rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;background:rgba(255,204,0,.15);color:#ffcc00}
    .nm{font-weight:700;color:#f0e8c0}
    .hdl{font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(240,232,192,.62)}
    .fol{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(240,232,192,.5)}
    .empty{padding:16px 4px;color:rgba(240,232,192,.48);font-family:"JetBrains Mono",monospace;font-size:11px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/projects"><img src="/logo.png" alt="Nerds Alpha" /><span>Nerds Alpha - Reuse Tools</span></a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="/projects">Projects</a>
        <a class="btn primary" href="/reuse">Reuse</a>
        <a class="btn" href="/kol-alerts">Token Alerts</a>
        <a class="btn" href="/daily-finds">Daily Finds</a>
        <a class="btn" href="/account">Account</a>
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <div class="pt">Reuse Search</div>
        <div class="ps">First 10 followers + username history</div>
      </div>
      <div class="pb">
        <div class="row">
          <input id="q" class="inp" placeholder="@project | x.com/project" />
          <button id="bFirst" class="act">First 10 Followers</button>
          <button id="bReuse" class="act">Username History</button>
        </div>
        <div class="hint">Best-effort data from live Twitter sessions.</div>
        <div id="status" class="status"></div>
        <div id="out" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");}
    function nfmt(n){var x=Number(n||0); if(!isFinite(x)) return "0"; return x.toLocaleString();}
    async function postJson(url, body){
      var r = await fetch(url,{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});
      var txt = await r.text();
      var js = {};
      try{ js = txt ? JSON.parse(txt) : {}; }catch(e){}
      if(!r.ok){
        var m = (js && (js.detail || js.message)) ? (js.detail || js.message) : ("HTTP "+r.status);
        throw new Error(String(m));
      }
      return js || {};
    }
    function setStatus(msg, cls){
      var el = document.getElementById("status");
      el.className = "status" + (cls ? (" "+cls) : "");
      el.textContent = msg || "";
    }
    function getQuery(){
      return String(document.getElementById("q").value || "").trim();
    }
    function renderFollowers(d){
      var out = document.getElementById("out");
      var target = d.target || {};
      var rows = Array.isArray(d.first_followers) ? d.first_followers : [];
      var html = "";
      html += '<div class="target">Target: <b>@'+esc(target.handle||d.query||"")+'</b> · '+nfmt(target.followers||0)+' followers</div>';
      if(!rows.length){
        html += '<div class="empty">No followers found.</div>';
      }else{
        rows.forEach(function(r){
          html += '<div class="item">';
          html +=   '<div class="rank">#'+esc(r.rank)+'</div>';
          html +=   '<div><div class="nm">'+esc(r.name||"-")+'</div><div class="hdl">@'+esc(r.handle||"-")+'</div></div>';
          html +=   '<div class="fol">'+nfmt(r.followers||0)+' fol</div>';
          html += '</div>';
        });
      }
      if(d.note){ html += '<div class="hint" style="margin-top:10px;">'+esc(d.note)+'</div>'; }
      out.innerHTML = html;
    }
    function renderHistory(d){
      var out = document.getElementById("out");
      var arr = Array.isArray(d.history) ? d.history : [];
      var uid = d.user_id ? (' · id '+esc(d.user_id)) : '';
      var html = '<div class="target">Current: <b>@'+esc(d.current_handle||d.query||"-")+'</b>'+uid+'</div>';
      if(!arr.length){
        html += '<div class="empty">No rename history from X (not exposed for this integration).</div>';
      }else{
        arr.forEach(function(h, i){
          html += '<div class="item"><div class="rank">#'+(i+1)+'</div><div class="nm">@'+esc(h)+'</div><div></div></div>';
        });
      }
      if(d.note){ html += '<div class="hint" style="margin-top:10px;">'+esc(d.note)+'</div>'; }
      out.innerHTML = html;
    }

    document.getElementById("bFirst").onclick = async function(){
      var q = getQuery();
      if(!q){ setStatus("Paste @handle or x.com link", "err"); return; }
      setStatus("Loading first followers...", "");
      document.getElementById("out").innerHTML = "";
      try{
        var d = await postJson("/api/reuse/first-followers",{query:q});
        renderFollowers(d);
        setStatus("Done", "ok");
      }catch(e){
        setStatus(String(e && e.message || e), "err");
      }
    };
    document.getElementById("bReuse").onclick = async function(){
      var q = getQuery();
      if(!q){ setStatus("Paste @handle or x.com link", "err"); return; }
      setStatus("Loading username history...", "");
      document.getElementById("out").innerHTML = "";
      try{
        var d = await postJson("/api/reuse/username-history",{query:q});
        renderHistory(d);
        setStatus("Done", "ok");
      }catch(e){
        setStatus(String(e && e.message || e), "err");
      }
    };
  </script>
</body>
</html>
